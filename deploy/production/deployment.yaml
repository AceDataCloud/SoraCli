apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: sora-cli
  name: sora-cli
  namespace: acedatacloud
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: sora-cli
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: sora-cli
    spec:
      containers:
        - name: sora-cli
          image: ghcr.io/acedatacloud/sora-cli:${TAG}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      dnsPolicy: ClusterFirst
      restartPolicy: Always
